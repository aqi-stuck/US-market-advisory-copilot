name: Weekly Market Data Ingest

on:
  schedule:
    # Runs every Sunday at 00:00 UTC
    - cron: "0 0 * * 0"
  workflow_dispatch: # Allow manual trigger

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger external market data ingestion
        run: |
          API_URL="${{ secrets.INGEST_API_URL }}"
          API_KEY="${{ secrets.INGEST_API_KEY }}"

          if [ -z "$API_URL" ] || [ -z "$API_KEY" ]; then
            echo "❌ Missing required secrets: INGEST_API_URL or INGEST_API_KEY"
            exit 1
          fi

          echo "🚀 Triggering ingestion at $API_URL/v1/ingest/trigger-external"

          # Retry up to 5 times with 10s delay between attempts for transient failures
          RESPONSE=$(curl --retry 5 --retry-delay 10 --retry-all-errors \
            --connect-timeout 10 --max-time 120 \
            -sS -w "\n%{http_code}" -X POST \
            "$API_URL/v1/ingest/trigger-external" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "📊 Response Status: $HTTP_CODE"
          echo "📋 Response Body: $BODY"

          # Accept both 200 (completed) and 202 (accepted/async) as success
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "202" ]; then
            echo "❌ Ingestion failed with HTTP $HTTP_CODE"
            exit 1
          fi

          # Parse result with jq for robustness
          STATUS=$(echo "$BODY" | jq -r '.status // empty' 2>/dev/null || echo "")
          DOCS=$(echo "$BODY" | jq -r '.documents_processed // empty' 2>/dev/null || echo "")
          CHUNKS=$(echo "$BODY" | jq -r '.chunks_created // empty' 2>/dev/null || echo "")

          # Only enforce "completed" status if status field is present
          if [ -n "$STATUS" ] && [ "$STATUS" != "completed" ]; then
            echo "⚠️ Ingestion status: $STATUS (may still be processing)"
          fi

          echo "✅ Ingest Status: ${STATUS:-pending}"
          echo "📄 Documents: ${DOCS:-N/A}"
          echo "🔤 Chunks: ${CHUNKS:-N/A}"

          if [ "$STATUS" != "completed" ]; then
            echo "⚠️ Ingestion status: $STATUS"
            exit 1
          fi
